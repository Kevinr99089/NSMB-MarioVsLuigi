name: Update Mario Vs Luigi WebGL build

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure PWA assets exist
        run: |
          mkdir -p docs
          if [ ! -f docs/manifest.json ]; then
            cat > docs/manifest.json << 'EOF'
          {
            "name": "Mario Vs Luigi",
            "short_name": "NSMB - MariovsLuigi",
            "start_url": "./index.html",
            "scope": "./",
            "display": "standalone",
            "orientation": "any",
            "background_color": "#1e1e28",
            "theme_color": "#1e1e28",
            "icons": [
              { "src": "icon-192.png", "sizes": "192x192", "type": "image/png", "purpose": "any maskable" },
              { "src": "icon-512.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }
            ]
          }
          EOF
          fi
          if [ ! -f docs/sw.js ]; then
            cat > docs/sw.js << 'EOF'
          const CACHE_NAME = 'mvsl-shell-v1';
          const SHELL_FILES = ['./index.html', './manifest.json', './icon-192.png', './icon-512.png'];

          self.addEventListener('install', (event) => {
            self.skipWaiting();
            event.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(SHELL_FILES)));
          });

          self.addEventListener('activate', (event) => {
            event.waitUntil(self.clients.claim());
          });

          self.addEventListener('fetch', (event) => {
            const url = new URL(event.request.url);
            const isShellFile = SHELL_FILES.some((f) => url.pathname.endsWith(f.replace('./', '')));
            if (isShellFile) {
              event.respondWith(caches.match(event.request).then((cached) => cached || fetch(event.request)));
            }
          });
          EOF
          fi
          if [ ! -f docs/icon-192.png ]; then
            echo "" | base64 -d > docs/icon-192.png
          fi
          if [ ! -f docs/icon-512.png ]; then
            echo "" | base64 -d > docs/icon-512.png
          fi
          touch docs/.nojekyll

      - name: Check latest upstream release
        id: check
        run: |
          RELEASE_JSON=$(curl -s -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ipodtouch0218/NSMB-MarioVsLuigi/releases/latest")

          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          ASSET_URL=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("webgl"; "i")) | select(.name | endswith(".zip"))][0].browser_download_url')
          ASSET_NAME=$(echo "$RELEASE_JSON" | jq -r '[.assets[] | select(.name | test("webgl"; "i")) | select(.name | endswith(".zip"))][0].name')

          if [ "$ASSET_URL" = "null" ] || [ -z "$ASSET_URL" ]; then
            echo "Aucun asset WebGL trouve dans la derniere release." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"

          CURRENT=""
          if [ -f docs/.game-version ]; then
            CURRENT=$(cat docs/.game-version)
          fi

          if [ "$CURRENT" = "$TAG" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Version actuelle: $CURRENT / Derniere release: $TAG"

      - name: Download and extract new build
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          mkdir -p /tmp/new-build
          curl -L -o /tmp/build.zip "${{ steps.check.outputs.asset_url }}"
          unzip -q /tmp/build.zip -d /tmp/new-build

          SUBDIR=$(find /tmp/new-build -mindepth 1 -maxdepth 1 -type d | head -n 1)
          COUNT=$(find /tmp/new-build -mindepth 1 -maxdepth 1 | wc -l)
          if [ "$COUNT" = "1" ] && [ -n "$SUBDIR" ]; then
            echo "BUILD_ROOT=$SUBDIR" >> "$GITHUB_ENV"
          else
            echo "BUILD_ROOT=/tmp/new-build" >> "$GITHUB_ENV"
          fi

      - name: Patch index.html with PWA tags
        if: steps.check.outputs.up_to_date == 'false'
        run: python3 .github/scripts/patch_index.py "${{ env.BUILD_ROOT }}/index.html"

      - name: Replace game files, keep PWA assets
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          find docs -mindepth 1 -maxdepth 1 \
            ! -name 'manifest.json' \
            ! -name 'sw.js' \
            ! -name 'icon-192.png' \
            ! -name 'icon-512.png' \
            ! -name '.game-version' \
            ! -name '.nojekyll' \
            ! -name 'CNAME' \
            -exec rm -rf {} +

          cp -a "${{ env.BUILD_ROOT }}"/. docs/

          echo "${{ steps.check.outputs.tag }}" > docs/.game-version

      - name: Commit and push
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "Rien a committer"
            exit 0
          fi
          git commit -m "Update Mario Vs Luigi WebGL to ${{ steps.check.outputs.tag }}"
          git push
