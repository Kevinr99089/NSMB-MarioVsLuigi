<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#1e1e28">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>html, body { overscroll-behavior: none; touch-action: manipulation; }</style>
    <script>
      function requestFullscreenSafe() {
        if (document.fullscreenElement) return;
        var el = document.documentElement;
        var request = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (request) {
          try {
            var result = request.call(el);
            if (result && result.catch) { result.catch(function() {}); }
          } catch (e) {}
        }
      }
      window.addEventListener('load', requestFullscreenSafe);
      document.addEventListener('click', requestFullscreenSafe);
      document.addEventListener('touchend', requestFullscreenSafe);
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
      }
      function isBenignFullscreenPermissionError(err) {
        return err instanceof TypeError && err.message === 'Permissions check failed';
      }
      window.addEventListener('error', function(event) {
        if (isBenignFullscreenPermissionError(event.error)) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        if (isBenignFullscreenPermissionError(event.reason)) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      });
      function hookUnityQuit(unityInstance) {
        var module = unityInstance && unityInstance.Module;
        if (!module) return;
        module.onQuit = function() {
          var isStandalone = window.navigator.standalone === true ||
            location.search.indexOf('homescreen=1') !== -1;
          if (document.fullscreenElement) {
            (document.exitFullscreen || function() {}).call(document).catch(function() {});
          }
          try { window.close(); } catch (e) {}
          if (isStandalone) {
            setTimeout(function() {
              try {
                location.href = 'intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.HOME;end';
              } catch (e) {}
            }, 150);
          }
          setTimeout(function() {
            document.body.innerHTML =
              '<div style="position:fixed;inset:0;display:flex;align-items:center;' +
              'justify-content:center;background:#1e1e28;color:#fff;' +
              'font-family:sans-serif;font-size:1.1rem;text-align:center;' +
              'padding:2rem;">Jeu quitte. Vous pouvez maintenant fermer cette fenetre.<br>' +
              'Game closed. You can now close this window.</div>';
          }, 500);
        };
      }
    </script>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | NSMB-MarioVsLuigi</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width=960 height=540 tabindex="-1" style="width: 100%; height: 100%; background: #CCCCCC"></canvas>
    <script src="Build/MarioVsLuigi-WebGL.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";

      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/MarioVsLuigi-WebGL.data.unityweb",
        frameworkUrl: "Build/MarioVsLuigi-WebGL.framework.js.unityweb",
        codeUrl: "Build/MarioVsLuigi-WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "ipodtouch0218",
        productName: "NSMB-MarioVsLuigi",
        productVersion: "2.1.1.0",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }).then((unityInstance) => {
        hookUnityQuit(unityInstance);
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
